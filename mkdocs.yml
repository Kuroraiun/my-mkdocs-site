plugins:
  - i18n:
      docs_structure: folder
      fallback_to_default: false
      reconfigure_material: false
      languages:
        - locale: en
          default: true
          name: EN
          build: true
          nav: *nav_en
        - locale: ja
          name: JA
          build: true
          theme:
            language: ja
          nav: *nav_ja

  - git-revision-date-localized:
      type: date
      timezone: Asia/Tokyo
      custom_format: "%Y-%m-%d"
      fallback_to_build_date: true

  - search
  - glightbox

extra:
  generator: false
  alternate:
    - name: EN
      link: /kb/
      lang: en
    - name: JA
      link: /kb/ja/
      lang: ja

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.magiclink
  - admonition